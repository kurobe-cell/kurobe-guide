<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist Guide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Welcome! / ようこそ！</h1>
        <p>Select your language / 言語を選んでください</p>
        
        <div class="flags">
            <img src="assets/images/jp.png" onclick="selectLang('ja')" alt="Japanese">
            <img src="assets/images/us.png" onclick="selectLang('en')" alt="English">
        </div>

        <hr>

        <div id="guide-area" style="display:none;">
            <h2 id="guide-title"></h2>
            <p id="guide-text"></p>
            <button id="play-btn">🔊 Listen (再生)</button>
            <audio id="audio-player"></audio>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
